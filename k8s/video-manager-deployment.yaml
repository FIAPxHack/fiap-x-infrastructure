apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-manager
  namespace: default
  labels:
    app: video-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-manager
  template:
    metadata:
      labels:
        app: video-manager
    spec:
      serviceAccountName: video-manager-sa
      containers:
      - name: video-manager
        image: ${VIDEO_MANAGER_IMAGE}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: AWS_REGION
          value: "us-east-1"
        - name: DB__Host
          value: ${RDS_ENDPOINT}
        - name: DB__Port
          value: "5432"
        - name: DB__Name
          value: "videomanager"
        - name: DB__Username
          value: "postgres"
        - name: DB__Password
          valueFrom:
            secretKeyRef:
              name: video-manager-db-secret
              key: DB_PASSWORD
        - name: S3__BucketName
          value: ${S3_BUCKET_NAME}
        - name: S3__UseMinIO
          value: "false"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: video-manager
  namespace: default
  labels:
    app: video-manager
spec:
  selector:
    app: video-manager
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  type: LoadBalancer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: video-manager-sa
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: ${VIDEO_MANAGER_ROLE_ARN}