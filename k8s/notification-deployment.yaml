apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiap-x-notification
  namespace: default
  labels:
    app: fiap-x-notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fiap-x-notification
  template:
    metadata:
      labels:
        app: fiap-x-notification
    spec:
      serviceAccountName: fiap-x-notification-sa
      containers:
      - name: fiap-x-notification
        image: ${NOTIFICATION_IMAGE}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fiap-x-notification
  namespace: default
  labels:
    app: fiap-x-notification
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: fiap-x-notification
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  type: LoadBalancer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fiap-x-notification-sa
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: ${NOTIFICATION_ROLE_ARN}