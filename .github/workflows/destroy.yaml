name: Destroy Video Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm'
        required: true

jobs:
  destroy:
    name: Destroy All
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DESTROY'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Get EKS Cluster
        id: cluster
        working-directory: terraform
        run: |
          CLUSTER=$(terraform output -raw eks_cluster_name 2>/dev/null || echo "fiapx-video-eks-dev")
          echo "name=$CLUSTER" >> $GITHUB_OUTPUT

      - name: Setup kubectl
        run: aws eks update-kubeconfig --region us-east-1 --name ${{ steps.cluster.outputs.name }} || true

      - name: Delete All K8s Resources
        run: |
          echo "Deleting services (removes Load Balancers)..."
          kubectl delete service --all -n default --timeout=5m || true
          sleep 60

          echo "Deleting deployments..."
          kubectl delete deployment --all -n default --timeout=5m || true

          echo "Deleting remaining resources..."
          kubectl delete configmap --all -n default || true
          kubectl delete secret --all -n default || true
          kubectl delete serviceaccount --all -n default || true
          kubectl delete hpa --all -n default || true
          sleep 30

      - name: Cleanup ECR
        run: |
          aws ecr delete-repository --repository-name fiapx-video-worker --force || true
          aws ecr delete-repository --repository-name fiapx-video-manager --force || true
          aws ecr delete-repository --repository-name fiapx-user --force || true
          aws ecr delete-repository --repository-name fiapx-auth --force || true
          aws ecr delete-repository --repository-name fiapx-notification --force || true
          aws ecr delete-repository --repository-name fiapx-api-gateway --force || true

      - name: Terraform Destroy
        working-directory: terraform
        run: terraform destroy -auto-approve