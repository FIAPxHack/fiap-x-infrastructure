name: Build Services

on:
  workflow_call:
    outputs:
      video-processor-image:
        value: ${{ jobs.containers.outputs.video-processor }}
      video-manager-image:
        value: ${{ jobs.containers.outputs.video-manager }}
      user-image:
        value: ${{ jobs.containers.outputs.user }}
      auth-image:
        value: ${{ jobs.containers.outputs.auth }}
      notification-image:
        value: ${{ jobs.containers.outputs.notification }}
      api-gateway-image:
        value: ${{ jobs.containers.outputs.api-gateway }}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      video-processor: ${{ steps.changes.outputs.video-processor }}
      video-manager: ${{ steps.changes.outputs.video-manager }}
      user: ${{ steps.changes.outputs.user }}
      auth: ${{ steps.changes.outputs.auth }}
      notification: ${{ steps.changes.outputs.notification }}
      api-gateway: ${{ steps.changes.outputs.api-gateway }}
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Detect Changes
        id: changes
        run: |
          if aws ecr describe-images --repository-name fiapx-video-worker --region us-east-1 --image-ids imageTag=${{ github.sha }} 2>/dev/null; then
            echo "video-processor=false" >> $GITHUB_OUTPUT
          else
            echo "video-processor=true" >> $GITHUB_OUTPUT
          fi

          if aws ecr describe-images --repository-name fiapx-video-manager --region us-east-1 --image-ids imageTag=${{ github.sha }} 2>/dev/null; then
            echo "video-manager=false" >> $GITHUB_OUTPUT
          else
            echo "video-manager=true" >> $GITHUB_OUTPUT
          fi

          if aws ecr describe-images --repository-name fiapx-user --region us-east-1 --image-ids imageTag=${{ github.sha }} 2>/dev/null; then
            echo "user=false" >> $GITHUB_OUTPUT
          else
            echo "user=true" >> $GITHUB_OUTPUT
          fi

          if aws ecr describe-images --repository-name fiapx-auth --region us-east-1 --image-ids imageTag=${{ github.sha }} 2>/dev/null; then
            echo "auth=false" >> $GITHUB_OUTPUT
          else
            echo "auth=true" >> $GITHUB_OUTPUT
          fi

          if aws ecr describe-images --repository-name fiapx-notification --region us-east-1 --image-ids imageTag=${{ github.sha }} 2>/dev/null; then
            echo "notification=false" >> $GITHUB_OUTPUT
          else
            echo "notification=true" >> $GITHUB_OUTPUT
          fi

          if aws ecr describe-images --repository-name fiapx-api-gateway --region us-east-1 --image-ids imageTag=${{ github.sha }} 2>/dev/null; then
            echo "api-gateway=false" >> $GITHUB_OUTPUT
          else
            echo "api-gateway=true" >> $GITHUB_OUTPUT
          fi

  containers:
    name: Container Images
    runs-on: ubuntu-latest
    needs: [detect-changes]
    outputs:
      video-processor: ${{ steps.images.outputs.video-processor }}
      video-manager: ${{ steps.images.outputs.video-manager }}
      user: ${{ steps.images.outputs.user }}
      auth: ${{ steps.images.outputs.auth }}
      notification: ${{ steps.images.outputs.notification }}
      api-gateway: ${{ steps.images.outputs.api-gateway }}

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- VIDEO PROCESSOR ---
      - name: Checkout Video Processor
        if: needs.detect-changes.outputs.video-processor == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fiap-x-microsservice-video-processor
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: video-processor

      - name: Build & Push Video Processor
        if: needs.detect-changes.outputs.video-processor == 'true'
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/fiapx-video-worker:${{ github.sha }} \
                        -t ${{ steps.ecr.outputs.registry }}/fiapx-video-worker:latest \
                        ./video-processor
          docker push ${{ steps.ecr.outputs.registry }}/fiapx-video-worker:${{ github.sha }}
          docker push ${{ steps.ecr.outputs.registry }}/fiapx-video-worker:latest

      # --- VIDEO MANAGER ---
      - name: Checkout Video Manager
        if: needs.detect-changes.outputs.video-manager == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fiap-x-microsservice-video-manager
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: video-manager

      - name: Build & Push Video Manager
        if: needs.detect-changes.outputs.video-manager == 'true'
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/fiapx-video-manager:${{ github.sha }} \
                        -t ${{ steps.ecr.outputs.registry }}/fiapx-video-manager:latest \
                        ./video-manager
          docker push ${{ steps.ecr.outputs.registry }}/fiapx-video-manager:${{ github.sha }}
          docker push ${{ steps.ecr.outputs.registry }}/fiapx-video-manager:latest

      # --- USER ---
      - name: Checkout User
        if: needs.detect-changes.outputs.user == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fiap-x-microsservice-user
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: user

      - name: Build & Push User
        if: needs.detect-changes.outputs.user == 'true'
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/fiapx-user:${{ github.sha }} \
                        -t ${{ steps.ecr.outputs.registry }}/fiapx-user:latest \
                        ./user
          docker push ${{ steps.ecr.outputs.registry }}/fiapx-user:${{ github.sha }}
          docker push ${{ steps.ecr.outputs.registry }}/fiapx-user:latest

      # --- AUTH ---
      - name: Checkout Auth
        if: needs.detect-changes.outputs.auth == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fiap-x-microsservice-auth
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: auth

      - name: Build & Push Auth
        if: needs.detect-changes.outputs.auth == 'true'
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/fiapx-auth:${{ github.sha }} \
                        -t ${{ steps.ecr.outputs.registry }}/fiapx-auth:latest \
                        ./auth
          docker push ${{ steps.ecr.outputs.registry }}/fiapx-auth:${{ github.sha }}
          docker push ${{ steps.ecr.outputs.registry }}/fiapx-auth:latest

      # --- NOTIFICATION ---
      - name: Checkout Notification
        if: needs.detect-changes.outputs.notification == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fiap-x-microservice-notification
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: notification

      - name: Build & Push Notification
        if: needs.detect-changes.outputs.notification == 'true'
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/fiapx-notification:${{ github.sha }} \
                        -t ${{ steps.ecr.outputs.registry }}/fiapx-notification:latest \
                        ./notification
          docker push ${{ steps.ecr.outputs.registry }}/fiapx-notification:${{ github.sha }}
          docker push ${{ steps.ecr.outputs.registry }}/fiapx-notification:latest

      # --- API GATEWAY ---
      - name: Checkout API Gateway
        if: needs.detect-changes.outputs.api-gateway == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fiap-x-api-gateway
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: api-gateway

      - name: Build & Push API Gateway
        if: needs.detect-changes.outputs.api-gateway == 'true'
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/fiapx-api-gateway:${{ github.sha }} \
                        -t ${{ steps.ecr.outputs.registry }}/fiapx-api-gateway:latest \
                        ./api-gateway
          docker push ${{ steps.ecr.outputs.registry }}/fiapx-api-gateway:${{ github.sha }}
          docker push ${{ steps.ecr.outputs.registry }}/fiapx-api-gateway:latest

      - name: Set Image Outputs
        id: images
        run: |
          REGISTRY=${{ steps.ecr.outputs.registry }}
          SHA=${{ github.sha }}
          echo "video-processor=${REGISTRY}/fiapx-video-worker:${SHA}" >> $GITHUB_OUTPUT
          echo "video-manager=${REGISTRY}/fiapx-video-manager:${SHA}" >> $GITHUB_OUTPUT
          echo "user=${REGISTRY}/fiapx-user:${SHA}" >> $GITHUB_OUTPUT
          echo "auth=${REGISTRY}/fiapx-auth:${SHA}" >> $GITHUB_OUTPUT
          echo "notification=${REGISTRY}/fiapx-notification:${SHA}" >> $GITHUB_OUTPUT
          echo "api-gateway=${REGISTRY}/fiapx-api-gateway:${SHA}" >> $GITHUB_OUTPUT