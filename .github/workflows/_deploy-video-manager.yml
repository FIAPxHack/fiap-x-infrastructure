name: Deploy Video Manager

on:
  workflow_call:
    inputs:
      video-manager-image:
        required: true
        type: string
      eks-cluster:
        required: true
        type: string
      video-manager-role:
        required: true
        type: string
      rds-endpoint:
        required: true
        type: string
      rds-secret-arn:
        required: true
        type: string
      s3-bucket-name:
        required: true
        type: string
    outputs:
      manager-url:
        value: ${{ jobs.deploy.outputs.url }}

jobs:
  deploy:
    name: Deploy Video Manager
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.lb.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Configurando kubectl
        run: aws eks update-kubeconfig --region us-east-1 --name ${{ inputs.eks-cluster }}

      - name: Verificando Imagem
        run: |
          aws ecr describe-images \
            --repository-name fiapx-video-manager \
            --image-ids imageTag=$(echo "${{ inputs.video-manager-image }}" | cut -d':' -f2) \
            --region us-east-1
          echo "✅ Imagem verificada"

      - name: Obtendo senha do banco
        id: db-secret
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id ${{ inputs.rds-secret-arn }} \
            --query SecretString --output text)
          DB_PASSWORD=$(echo $SECRET_JSON | jq -r '.password')
          echo "::add-mask::$DB_PASSWORD"
          echo "password=$DB_PASSWORD" >> $GITHUB_OUTPUT

      - name: Criando Secret do Banco
        run: |
          kubectl create secret generic video-manager-db-secret \
            --from-literal=DB_PASSWORD="${{ steps.db-secret.outputs.password }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Video Manager
        env:
          VIDEO_MANAGER_IMAGE: ${{ inputs.video-manager-image }}
          VIDEO_MANAGER_ROLE_ARN: ${{ inputs.video-manager-role }}
          RDS_ENDPOINT: ${{ inputs.rds-endpoint }}
          S3_BUCKET_NAME: ${{ inputs.s3-bucket-name }}
        run: envsubst < k8s/video-manager-deployment.yaml | kubectl apply -f -

      - name: Deploy HPA
        run: kubectl apply -f k8s/hpa.yaml

      - name: Aguardando Rollout
        run: kubectl rollout status deployment/video-manager --timeout=300s

      - name: Obtendo URL do LoadBalancer
        id: lb
        run: |
          for i in {1..20}; do
            URL=$(kubectl get svc video-manager \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$URL" ]; then
              echo "url=http://$URL" >> $GITHUB_OUTPUT
              echo "✅ Video Manager URL: http://$URL"
              exit 0
            fi
            echo "Tentativa $i/20..."
            sleep 10
          done
          echo "url=http://pending" >> $GITHUB_OUTPUT
          echo "⚠️ LoadBalancer ainda provisionando"

      - name: Verificando Implantação
        run: |
          echo "✅ Video Manager implantado com sucesso"
          kubectl get pods -l app=video-manager
          kubectl get svc video-manager