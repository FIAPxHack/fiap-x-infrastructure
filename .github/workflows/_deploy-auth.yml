name: Deploy Auth

on:
  workflow_call:
    inputs:
      auth-image:
        required: true
        type: string
      eks-cluster:
        required: true
        type: string
      rds-endpoint:
        required: true
        type: string
      rds-secret-arn:
        required: true
        type: string
      auth-role:
        required: true
        type: string
      s3-bucket-name:
        required: true
        type: string

jobs:
  deploy:
    name: Deploy Auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Configurando kubectl
        run: aws eks update-kubeconfig --region us-east-1 --name ${{ inputs.eks-cluster }}

      - name: Verificando Imagem
        run: |
          aws ecr describe-images \
            --repository-name fiapx-auth \
            --image-ids imageTag=$(echo "${{ inputs.auth-image }}" | cut -d':' -f2) \
            --region us-east-1
          echo "Imagem verificada"

      - name: Obtendo senha do banco
        id: db-secret
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id ${{ inputs.rds-secret-arn }} \
            --query SecretString --output text)
          DB_PASSWORD=$(echo $SECRET_JSON | jq -r '.password')
          echo "::add-mask::$DB_PASSWORD"
          echo "password=$DB_PASSWORD" >> $GITHUB_OUTPUT

      - name: Criando Secret do Banco
        run: |
          kubectl create secret generic fiap-x-auth-db-secret \
            --from-literal=DB_PASSWORD="${{ steps.db-secret.outputs.password }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Auth
        env:
          AUTH_IMAGE: ${{ inputs.auth-image }}
          AUTH_DB_ENDPOINT: ${{ inputs.rds-endpoint }}
          AUTH_ROLE_ARN: ${{ inputs.auth-role }}
          S3_BUCKET_NAME: ${{ inputs.s3-bucket-name }}
        run: envsubst < k8s/auth-deployment.yaml | kubectl apply -f -

      - name: Aguardando Rollout
        run: kubectl rollout status deployment/fiap-x-auth --timeout=300s

      - name: Verificando Implantacao
        run: |
          echo "Auth implantado com sucesso"
          kubectl get pods -l app=fiap-x-auth
          kubectl get svc fiap-x-auth